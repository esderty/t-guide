server:
    servlet:
        context-path: /api
    port: ${SERVER_PORT:8080}
    forward-headers-strategy: framework

spring:
    profiles:
        default: production
    devtools:
        add-properties: true
    application:
        name: t-guide
        version: 1.0.0
    datasource:
        url: jdbc:postgresql://${DB_IP}:${DB_PORT}/${DB_NAME}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    data:
        redis:
            repositories:
                enabled: false
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}
            password: ${REDIS_PASSWORD}
            timeout: 3s

        jdbc:
            dialect: postgresql
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        validate-migration-naming: true
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB
    jackson:
        time-zone: Europe/Moscow
    cloud:
        aws:
            region:
                static: ${AWS_REGION:us-east-1}
            credentials:
                access-key: ${AWS_ACCESS_KEY}
                secret-key: ${AWS_SECRET_KEY}
            s3:
                endpoint: ${S3_ENDPOINT}
                path-style-access-enabled: ${S3_PATH_STYLE:true}

springdoc:
    api-docs:
        enabled: false
    swagger-ui:
        enabled: false

security:
    jwt:
        secret: ${JWT_SECRET}
        issuer: https://tguide.enzolu.ru
        access-ttl: PT15M       # 15 минут
        refresh-ttl: P30D       # 30 дней
    cors:
        allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS}


logging:
    level:
        org.hibernate.SQL: WARN
        org.hibernate.orm.jdbc.bind: WARN
        org.flywaydb: INFO
        web: WARN

app:
    storage:
        bucket: ${S3_BUCKET}
        public-base-url: ${S3_PUBLIC_BASE_URL}
---

spring:
    config:
        activate:
            on-profile: dev
    devtools:
        add-properties: true

springdoc:
    api-docs:
        enabled: true
        path: /api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui

logging:
    level:
        org.hibernate.SQL: DEBUG
        org.hibernate.orm.jdbc.bind: DEBUG
        org.flywaydb: DEBUG
        web: DEBUG

---

spring:
    config:
        activate:
            on-profile: demo
    devtools:
        add-properties: true

springdoc:
    api-docs:
        enabled: true
        path: /api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui
