server:
  servlet:
    context-path: /api
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    default: production
  application:
    name: t-guide
    version: 1.0.0
  datasource:
    url: jdbc:postgresql://${DB_IP}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    time-zone: Europe/Moscow

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

security:
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS}

---

spring:
  config:
    activate:
      on-profile: demo
  devtools:
    add-properties: true

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui